<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <nav>
        <div class="left">Kanban</div>
        <div class="right"><button id="toggle-modal">Add new task</button></div>
      </nav>
      <section class="board">
        <div id="to-do" class="task-column">
          <div class="heading">
            <div class="left">To Do</div>
            <div class="right">0</div>
          </div>
          <!-- <div class="task" draggable="true">
            <h2>Task 1</h2>
            <p>
              Lorem ipsum dolor sit Lorem, ipsum dolor sit amet consectetur
              adipisicing elit. Praesentium
            </p>
            <button>Delete</button>
          </div> -->
        </div>
        <div id="progress" class="task-column">
          <div class="heading">
            <div class="left">In Progress</div>
            <div class="right">0</div>
          </div>
        </div>
        <div id="done" class="task-column">
          <div class="heading">
            <div class="left">Done</div>
            <div class="right">0</div>
          </div>
        </div>
      </section>
    </main>
    <div class="modal">
      <div class="bg"></div>
      <div class="center">
        <input type="text" id="task-title-input" placeholder="Task Title" />
        <textarea
          placeholder="Task Description"
          id="task-desc-input"
        ></textarea>
        <button id="add-new-task">Add Task</button>
        <div class="err-msg"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
